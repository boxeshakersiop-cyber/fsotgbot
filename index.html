<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZUK Control Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #1e1e1e; --container-bg: rgba(30, 30, 30, 0.75); --text-color: #d4d4d4; --accent-color: #007acc; --border-color: rgba(255, 255, 255, 0.1); }
        body.tg { --bg-color: var(--tg-theme-bg-color, #1e1e1e); --text-color: var(--tg-theme-text-color, #d4d4d4); --accent-color: var(--tg-theme-button-color, #007acc); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        header { margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        h1 { font-size: 1.4rem; color: #ffffff; margin-bottom: 5px; }
        .status-bar { font-size: 0.85rem; display: flex; justify-content: space-between; opacity: 0.8; }
        .select-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .select-box { flex: 1; padding: 10px; background: var(--container-bg); border: 1px solid var(--border-color); color: #fff; border-radius: 8px; font-size: 1rem; outline: none; backdrop-filter: blur(10px); }
        .refresh-btn { background: var(--accent-color); border: none; color: white; padding: 0 15px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .btn { background: var(--container-bg); border: 1px solid var(--border-color); color: #ffffff; padding: 15px 10px; border-radius: 10px; font-size: 0.95rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn:active { transform: scale(0.96); background: var(--accent-color); }
        .console-box { background: #000000; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-top: auto; }
        .console-title { font-family: monospace; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
        .console-row { display: flex; gap: 8px; }
        .console-row select { background: #222; border: 1px solid #444; color: #00ff00; font-family: monospace; padding: 5px; border-radius: 4px; }
        .console-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid #444; color: #00ff00; font-family: monospace; font-size: 0.95rem; outline: none; }
        .console-btn { background: #222; border: 1px solid #444; color: #00ff00; padding: 4px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>ZUK Панель Управления</h1>
        <div class="status-bar">
            <span id="user-info">Администратор</span>
            <span id="ping-status" style="color: #00ff00;">● Автоматический поиск ПК</span>
        </div>
    </header>

    <div class="select-row">
        <select id="pc-selector" class="select-box">
            <option value="">-- Поиск запущенных ПК... --</option>
        </select>
        <button class="refresh-btn" onclick="fetchActivePCs()">🔄</button>
    </div>

    <div class="grid-container">
        <button class="btn" onclick="sendAction('screen')">📸 Скриншот</button>
        <button class="btn" onclick="sendAction('sysinfo')">ℹ️ Инфо ПК</button>
        <button class="btn" onclick="sendAction('ps')">📋 Процессы</button>
        <button class="btn" onclick="sendAction('mon_off')">🔌 Выкл Монитор</button>
        <button class="btn" onclick="sendAction('lock')">🔒 Блок ПК</button>
    </div>

    <div class="console-box">
        <div class="console-title">ZUK_TERMINAL_ENGINE v2.0</div>
        <div class="console-row">
            <select id="shell-type"><option value="cmd">CMD</option><option value="ps">PS</option></select>
            <input type="text" id="raw-command" class="console-input" placeholder="Введите команду...">
            <button class="console-btn" onclick="sendTerminalCommand()">></button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand(); document.body.classList.add('tg');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) document.getElementById('user-info').innerText = `Админ: ${tg.initDataUnsafe.user.first_name}`;

        // ================= НАСТРОЙКА ДАННЫХ GITHUB =================
        const GITHUB_TOKEN = "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"; 
        const REPO_OWNER = "boxeshakersiop-cyber";
        const REPO_NAME = "-fsotgbot";
        // ===========================================================

        // Авто-сканирование репозитория на наличие запущенных клиентов
        function fetchActivePCs() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;
            fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } })
            .then(res => res.json())
            .then(files => {
                const selector = document.getElementById('pc-selector');
                const currentValue = selector.value;
                selector.innerHTML = '<option value="">-- Выберите найденный ПК --</option>';
                
                files.forEach(file => {
                    if(file.name.endsWith('.json') && file.name !== 'package.json' && file.name !== 'task.json') {
                        const pcName = file.name.replace('.json', '');
                        const option = document.createElement('option');
                        option.value = pcName; option.innerText = `💻 ${pcName}`;
                        if(pcName === currentValue) option.selected = true;
                        selector.appendChild(option);
                    }
                });
                if(selector.options.length === 1) { selector.innerHTML = '<option value="">❌ Активных ПК не обнаружено</option>'; }
            }).catch(() => tg.showAlert("Ошибка автопоиска машин."));
        }

        function commitTaskFile(targetPC, payloadData) {
            if (!targetPC) { tg.showAlert("Сначала выберите ПК из списка!"); return; }
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${targetPC}.json`;
            
            fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } })
            .then(res => res.json())
            .then(fileData => {
                const sha = fileData.sha;
                const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(payloadData))));
                return fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ message: "Trigger", content: base64Content, sha: sha })
                });
            })
            .then(res => { if(res.ok) tg.showPopup({ title: "Выполнено", message: `Сигнал отправлен на ${targetPC}`, buttons: [{type:"ok"}] }); })
            .catch(() => tg.showAlert("Ошибка отправки."));
        }

        function sendAction(actionType) {
            const pc = document.getElementById('pc-selector').value;
            commitTaskFile(pc, { target_pc: pc, type: "button", command: actionType, timestamp: String(Date.now()) });
        }

        function sendTerminalCommand() {
            const pc = document.getElementById('pc-selector').value;
            const shell = document.getElementById('shell-type').value;
            const text = document.getElementById('raw-command').value;
            if(!text.trim()) return;
            commitTaskFile(pc, { target_pc: pc, type: shell, command: text, timestamp: String(Date.now()) });
            document.getElementById('raw-command').value = "";
        }

        // Запуск сканирования при старте и каждые 7 секунд
        fetchActivePCs(); setInterval(fetchActivePCs, 7000);
    </script>
</body>
</html>
